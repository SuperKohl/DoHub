services:
  backend:
    build: ./backend
    container_name: dohub-backend
    restart: unless-stopped
    network_mode: host          # Required for mDNS/Bonjour broadcast
    privileged: true            # Required for USB printer access
    volumes:
      - /var/run/cups:/var/run/cups    # CUPS socket
      - /dev/bus/usb:/dev/bus/usb      # USB printers
      - /tmp/dohub-scans:/scans     # Scan output
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - frontend

  frontend:
    build: ./frontend
    container_name: dohub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  # Nginx reverse proxy – serves frontend + proxies /api to backend
  nginx:
    image: nginx:alpine
    container_name: dohub-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
